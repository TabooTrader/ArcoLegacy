[options]
HoldPkg = pacman glibc
Architecture = auto
SigLevel = Required DatabaseOptional
ParallelDownloads = 5
Color
CheckSpace
VerbosePkgLists
ILoveCandy

# Official Arch repos
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# Chaotic-AUR (optional)
# [chaotic-aur]
# Include = /etc/pacman.d/chaotic-mirrorlist

# XLibre
[xlibre]
Server = https://packages.xlibre.net/arch/stable/$arch

# Nemesis / local repo (enable when ready)
# [nemesis_repo]
# SigLevel = Optional TrustAll
# Server = file:///path/to/your/nemesis_repo
